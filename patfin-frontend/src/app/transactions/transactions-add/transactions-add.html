<div class="add-transaction-card">
  <div class="card-header">
    <h3 class="card-title">➕ Dodaj nową transakcję</h3>
  </div>
  <div class="card-body">
    <form (ngSubmit)="addTransaction()" #form="ngForm" class="transaction-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="amount">💰 Kwota (PLN)</label>
          <input type="number" 
                 id="amount"
                 name="amount" 
                 [(ngModel)]="amount" 
                 placeholder="0.00" 
                 step="0.01"
                 class="form-input"
                 required />
        </div>
        
        <div class="form-group">
          <label for="description">📝 Opis</label>
          <input type="text" 
                 id="description"
                 name="description" 
                 [(ngModel)]="description" 
                 placeholder="Opisz transakcję..." 
                 class="form-input"
                 required />
        </div>
        
        <div class="form-group">
          <label for="date">📅 Data</label>
          <input type="date" 
                 id="date"
                 name="date" 
                 [(ngModel)]="date" 
                 class="form-input"
                 required />
        </div>
        
        <div class="form-group">
          <label for="type">🔄 Typ transakcji</label>
          <select name="type" 
                  id="type"
                  [(ngModel)]="type" 
                  class="form-select"
                  required>
            <option value="">Wybierz typ</option>
            <option value="INCOME">💚 Przychód</option>
            <option value="EXPENSE">❤️ Wydatek</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="categoryId">🏷️ Kategoria</label>
          <select [(ngModel)]="categoryId" 
                  id="categoryId"
                  name="categoryId" 
                  class="form-select"
                  required>
            <option value="">Wybierz kategorię</option>
            <option *ngFor="let category of categories()" [value]="category.id">{{ category.name }}</option>
          </select>
        </div>
        
        <div class="form-group submit-group">
          <button type="submit" 
                  class="btn btn-primary btn-submit"
                  [disabled]="!form.valid">
            <span class="icon">✅</span>
            Dodaj transakcję
          </button>
        </div>
      </div>
    </form>
    
    <div *ngIf="success" class="success-message">
      <span class="success-icon">🎉</span>
      Transakcja została dodana pomyślnie!
    </div>
  </div>
</div>
