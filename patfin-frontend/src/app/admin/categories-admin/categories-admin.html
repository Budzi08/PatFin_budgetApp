<div class="admin-panel">
  <div class="admin-header">
    <h2>Kategorie (Panel administratora)</h2>
    <div class="admin-controls">
      <div class="theme-controls">
        <button 
          class="theme-toggle-button"
          [attr.aria-label]="'Zmień motyw'"
          [title]="'Wybierz motyw'"
          (click)="toggleThemeDropdown()">
          🎨
        </button>
        <div class="theme-dropdown" *ngIf="showThemeDropdown">
          <button 
            *ngFor="let theme of themeService.themes"
            class="theme-option"
            [class.active]="themeService.getCurrentTheme() === theme.id"
            [attr.aria-label]="theme.name + ': ' + theme.description"
            (click)="selectTheme(theme.id)">
            <span class="theme-icon">{{ theme.icon }}</span>
            <span class="theme-name">{{ theme.name }}</span>
          </button>
        </div>
      </div>
      <div class="font-controls">
        <button class="btn-icon" aria-label="Zmniejsz czcionkę" title="A-" (click)="fontSizeService.decrease()">
          A-
        </button>
        <button class="btn-icon" aria-label="Zwiększ czcionkę" title="A+" (click)="fontSizeService.increase()">
          A+
        </button>
      </div>
    </div>
  </div>
  <form (submit)="addCategory(); $event.preventDefault()">
    <input [(ngModel)]="newCategory" placeholder="Nowa kategoria" name="categoryName" required>
    <button type="submit">Dodaj</button>
  </form>
  <div *ngIf="isLoading">Ładowanie...</div>
  <ul>
    <li *ngFor="let c of categories">
      {{ c.name }}
      <button (click)="deleteCategory(c.id)">Usuń</button>
    </li>
  </ul>
  <div *ngIf="error">{{ error }}</div>
</div>
